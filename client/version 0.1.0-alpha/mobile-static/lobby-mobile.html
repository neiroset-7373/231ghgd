<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WintoBlox - Мобильное лобби</title>
    <link rel="stylesheet" href="wintoblox-mobile-lobby-menu.css">
</head>
<body>
    <div class="mobile-lobby">
        <div class="header">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">D</div>
                <span class="user-name">User</span>
            </div>
            <button class="back-btn" onclick="window.location.href='index.html'">← Назад</button>
        </div>

        <div class="games-container">
            <div class="game-card">
                <div class="game-icon">🏃</div>
                <div class="game-title">Побег от Патапима</div>
                <div class="game-desc">Убегай от монстра!</div>
                <button class="play-btn" onclick="window.location.href='games/pobeg_vmesto_obby_wintoblox.html'">
                    Играть ▶
                </button>
            </div>

            <div class="game-card">
                <div class="game-icon">🚦</div>
                <div class="game-title">Красный/Зелёный цвет</div>
                <div class="game-desc">Игра в кальмара</div>
                <button class="play-btn" onclick="window.location.href='games/kalmara.html'">
                    Играть ▶
                </button>
            </div>

            <div class="game-card disabled">
                <div class="game-icon">🔒</div>
                <div class="game-title">Игра 3</div>
                <div class="game-desc">Скоро...</div>
                <button class="play-btn" disabled>Скоро</button>
            </div>
        </div>

        <div class="settings-section">
            <h3>Настройки</h3>
            <button class="settings-btn" onclick="resetDevice()">Сменить устройство</button>
        </div>
    </div>

    <script>
        function resetDevice() {
            localStorage.removeItem('wintoblox-device');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
