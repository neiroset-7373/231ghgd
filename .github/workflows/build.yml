name: Build EXE and APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ./client/version 0.1.0-alpha
        run: npm install

      - name: Build Windows EXE
        working-directory: ./client/version 0.1.0-alpha
        run: |
          npm run build
          npx electron-builder --win --x64

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: wintoblox-alpha-windows
          path: ./client/version 0.1.0-alpha/dist/*.exe

  build-android-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./client/version 0.1.0-alpha
        run: npm install

      - name: Build for Android
        working-directory: ./client/version 0.1.0-alpha
        run: |
          npm run build
          npx cap sync android

      - name: Build APK
        working-directory: ./client/version 0.1.0-alpha
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wintoblox-alpha-android
          path: ./client/version 0.1.0-alpha/android/app/build/outputs/apk/debug/app-debug.apk
